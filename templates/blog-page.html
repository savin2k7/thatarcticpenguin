{% extends "blog-layout.html" %}

{% block content %}
<h1 class="title">
  {{ page.title }}
</h1>
<div class="meta">{{ page.date }} | {% for tag in page.extra.tags %}
    <span class="tag">#{{ tag }}</span>
{% endfor %}
</div>
<div class="content">
{{ page.content | safe }}
</div>
{% endblock content %}
